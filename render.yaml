services:
  # Backend API Service
  - type: web
    name: project-pilot-api
    runtime: docker
    dockerContext: .
    dockerfilePath: apps/api/Dockerfile
    plan: free # Change to a paid plan for production
    region: ohio # Change to your preferred region
    envVars:
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: project-pilot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: project-pilot-cache
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false # Set manually in Render dashboard
      - key: FRONTEND_URL
        sync: false # Set manually to your Vercel URL
      - key: CLOUDINARY_URL
        sync: false # Set manually in Render dashboard

databases:
  # Managed PostgreSQL
  - name: project-pilot-db
    plan: free
    region: ohio

redis:
  # Managed Redis
  - name: project-pilot-cache
    plan: free
    region: ohio
    ipAllowList: [] # Allows internal access from the API service
