services:
  - type: web
    name: project-pilot-api
    runtime: node
    region: oregon
    plan: free
    branch: main
    rootDir: .
    buildCommand: npm install && cd packages/database && npx prisma generate && cd ../.. && npm run build -w @project-pilot/api
    startCommand: node apps/api/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: FRONTEND_URL
        value: https://project-pilot-web.vercel.app
