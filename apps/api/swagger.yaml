openapi: 3.0.0
info:
  title: ProjectPilot API
  version: 1.0.0
  description: Enterprise-level project management platform with AI assistance.

servers:
  - url: http://localhost:4000/api/v1
    description: Local development server

paths:
  /auth/register:
    post:
      summary: Register a new user
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInput'
      responses:
        '201':
          description: User registered successfully
components:
  schemas:
    RegisterInput:
      type: object
      required:
        - email
        - password
        - firstName
        - lastName
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        firstName:
          type: string
        lastName:
          type: string
